name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: stadia-ai/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: stadia-ai

      - name: Run linter
        run: npm run lint
        working-directory: stadia-ai

      - name: Build application
        run: npm run build
        working-directory: stadia-ai
        env:
          NODE_ENV: production
